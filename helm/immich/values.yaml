immich:
  image:
    tag: v2.6.3

  # Shared across server, machine-learning, microservices components
  controllers:
    main:
      containers:
        main:
          env:
            DB_HOSTNAME: immich-database-rw
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: username
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            DB_VECTOR_EXTENSION: vchord

  # Chart-level settings from the upstream immich chart
  immich:
    persistence:
      library:
        existingClaim: immich-library

  valkey:
    enabled: true
